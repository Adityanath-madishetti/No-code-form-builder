components:
  schemas:
    User:
      type: object
      properties:
        uid:
          type: string
        email:
          type: string
        displayName:
          type: string
        photoURL:
          type: string
        role:
          type: string

paths:
  /api/users/me:
    get:
      summary: Get current user profile
      tags: [Users]
      security:
        - bearerAuth: []
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        401:
          description: Unauthorized
